version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: worldfork
      POSTGRES_PASSWORD: worldfork
      POSTGRES_DB: worldfork
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worldfork -d worldfork"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8003:8000"
    volumes:
      - ./backend:/app/backend
      - ./source_of_truth:/app/source_of_truth
      - ./runs:/data/runs
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload

  worker_p0:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./source_of_truth:/app/source_of_truth
      - ./runs:/data/runs
    command: celery -A backend.app.workers.celery_app worker -Q p0 -c 4 -n p0@%h --loglevel=INFO

  worker_p1:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./source_of_truth:/app/source_of_truth
      - ./runs:/data/runs
    command: celery -A backend.app.workers.celery_app worker -Q p1 -c 8 -n p1@%h --loglevel=INFO

  worker_p2:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./source_of_truth:/app/source_of_truth
      - ./runs:/data/runs
    command: celery -A backend.app.workers.celery_app worker -Q p2 -c 4 -n p2@%h --loglevel=INFO

  worker_p3:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./source_of_truth:/app/source_of_truth
      - ./runs:/data/runs
    command: celery -A backend.app.workers.celery_app worker -Q p3 -c 2 -n p3@%h --loglevel=INFO

  beat:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./source_of_truth:/app/source_of_truth
      - ./runs:/data/runs
    command: celery -A backend.app.workers.celery_app beat --loglevel=INFO

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    env_file: .env
    ports:
      - "3003:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    command: pnpm dev

volumes:
  pg_data:
  redis_data:
