# Inside docker, services connect via service names (not localhost).
# .env (host-side) uses localhost:5433/6379 for pytest/smoke scripts.
# This override injects service-name URLs for the api/worker/beat containers.
services:
  api:
    environment:
      DATABASE_URL: postgresql+asyncpg://worldfork:worldfork@postgres:5432/worldfork
      DATABASE_URL_SYNC: postgresql+psycopg://worldfork:worldfork@postgres:5432/worldfork
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
  worker_p0: &worker_env
    environment:
      DATABASE_URL: postgresql+asyncpg://worldfork:worldfork@postgres:5432/worldfork
      DATABASE_URL_SYNC: postgresql+psycopg://worldfork:worldfork@postgres:5432/worldfork
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
  worker_p1:
    <<: *worker_env
  worker_p2:
    <<: *worker_env
  worker_p3:
    <<: *worker_env
  beat:
    <<: *worker_env
